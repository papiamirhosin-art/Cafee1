<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <style>
        :root { --bg: #f9f7f2; --card: #ffffff; --text: #333; --accent: #8d7355; }
        body.dark { --bg: #1a1a1a; --card: #252525; --text: #e0e0e0; --accent: #c5a059; }
        body { background: var(--bg); color: var(--text); margin: 0; font-family: Tahoma, sans-serif; transition: 0.3s; }

        header { height: 300px; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        
        /* استایل Sticky */
        .sticky-nav { 
            position: sticky; top: 0; background: var(--bg); padding: 15px; 
            z-index: 1000; box-shadow: 0 4px 10px rgba(0,0,0,0.1); text-align: center;
        }

        .menu-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 25px; padding: 40px; max-width: 1000px; margin: auto; }
        .card { background: var(--card); padding: 20px; border-radius: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); transition: 0.4s; }
        
        .theme-btn { cursor: pointer; padding: 10px 20px; border-radius: 20px; border: none; background: var(--accent); color: white; }
    </style>
</head>
<body>

<header>
    <h1>کافه مدرن</h1>
    <button class="theme-btn" onclick="document.body.classList.toggle('dark')">تغییر تم</button>
</header>

<div class="sticky-nav" id="filters"></div>

<div class="menu-grid" id="menu"></div>

<script>
    const data = [
        { name: "اسپرسو دبل", cat: "نوشیدنی", price: "۸۵,۰۰۰" },
        { name: "لاته وانیلی", cat: "نوشیدنی", price: "۱۲۰,۰۰۰" },
        { name: "چیزکیک", cat: "دسر", price: "۱۱۰,۰۰۰" },
        { name: "کروسان", cat: "دسر", price: "۹۰,۰۰۰" }
    ];

    function render(filter = "همه") {
        const filtered = filter === "همه" ? data : data.filter(i => i.cat === filter);
        const menu = document.getElementById('menu');
        
        menu.innerHTML = filtered.map(item => `
            <div class="card">
                <h3>${item.name}</h3>
                <p class="price">${item.price} تومان</p>
            </div>
        `).join('');

        // اسکرول نرم به ابتدای محصولات
        document.getElementById('menu').scrollIntoView({ behavior: 'smooth' });
    }

    const cats = ["همه", ...new Set(data.map(i => i.cat))];
    document.getElementById('filters').innerHTML = cats.map(c => 
        `<button class="theme-btn" style="margin:5px" onclick="render('${c}')">${c}</button>`
    ).join('');

    render();
</script>
</body>
</html>
