<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>امیر حسین پاپی — 3D World</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: #000;
  overflow: hidden;
  font-family: 'Share Tech Mono', monospace;
  cursor: none;
}

#c { display:block; width:100vw; height:100vh; }

/* ── CUSTOM CURSOR ── */
#cur {
  position:fixed; width:16px; height:16px;
  border:2px solid #0ff; border-radius:50%;
  pointer-events:none; z-index:9999;
  transform:translate(-50%,-50%);
  transition: width .2s, height .2s, border-color .2s;
  box-shadow: 0 0 10px #0ff, 0 0 20px #0ff4;
  mix-blend-mode: screen;
}
#cur.hover { width:32px; height:32px; border-color:#f0f; box-shadow:0 0 16px #f0f, 0 0 32px #f0f4; }
#cur-dot {
  position:fixed; width:4px; height:4px;
  background:#0ff; border-radius:50%;
  pointer-events:none; z-index:9999;
  transform:translate(-50%,-50%);
}

/* ── LOADING ── */
#loading {
  position:fixed; inset:0; background:#000;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  z-index:8000; transition:opacity .8s;
}
#loading h1 {
  font-family:'Orbitron',sans-serif;
  font-size:clamp(20px,4vw,42px);
  color:#0ff;
  text-shadow:0 0 20px #0ff, 0 0 60px #0ff4;
  letter-spacing:6px;
  margin-bottom:10px;
  animation: flicker 3s infinite;
}
#loading p { color:#0f06; font-size:13px; letter-spacing:3px; margin-bottom:40px; }
#load-bar-wrap {
  width:300px; height:2px;
  background:rgba(0,255,255,.1);
  border:1px solid #0ff3;
}
#load-bar { height:100%; background:#0ff; width:0%; transition:width .1s; box-shadow:0 0 10px #0ff; }
#load-pct { color:#0ff8; font-size:11px; letter-spacing:2px; margin-top:10px; }

/* ── HUD ── */
#hud {
  position:fixed; inset:0; pointer-events:none; z-index:100;
}

/* corners */
.corner {
  position:absolute; width:24px; height:24px;
  border-color:#0ff4; border-style:solid;
}
.corner.tl { top:20px;left:20px; border-width:2px 0 0 2px; }
.corner.tr { top:20px;right:20px; border-width:2px 2px 0 0; }
.corner.bl { bottom:20px;left:20px; border-width:0 0 2px 2px; }
.corner.br { bottom:20px;right:20px; border-width:0 2px 2px 0; }

#hud-name {
  position:absolute; top:28px; left:50%;
  transform:translateX(-50%);
  font-family:'Orbitron',sans-serif;
  font-size:clamp(11px,1.5vw,16px);
  color:#0ff; letter-spacing:6px;
  text-shadow:0 0 10px #0ff;
  text-transform:uppercase;
}

#hud-title {
  position:absolute; top:50px; left:50%;
  transform:translateX(-50%);
  font-size:10px; color:#0ff6; letter-spacing:3px;
}

/* bottom status bar */
#status-bar {
  position:absolute; bottom:20px; left:50%;
  transform:translateX(-50%);
  display:flex; gap:32px; align-items:center;
}
.status-item { font-size:10px; color:#0ff5; letter-spacing:2px; }
.status-item span { color:#0ff; }

/* controls hint */
#controls {
  position:absolute; bottom:60px; left:28px;
  font-size:10px; color:#0ff4; line-height:2;
  letter-spacing:1px;
}

/* scan line */
#scanline {
  position:absolute; inset:0;
  background: repeating-linear-gradient(
    to bottom,
    transparent 0px,
    transparent 3px,
    rgba(0,255,255,.012) 3px,
    rgba(0,255,255,.012) 4px
  );
  pointer-events:none;
}

/* vignette */
#vignette {
  position:absolute; inset:0;
  background: radial-gradient(ellipse at center,
    transparent 55%,
    rgba(0,0,20,.7) 100%
  );
}

/* ── PANEL ── */
#panel {
  position:fixed; right:-420px; top:0; bottom:0;
  width:380px; background:rgba(0,5,15,.92);
  border-left:1px solid #0ff3;
  backdrop-filter:blur(20px);
  z-index:500; transition:right .5s cubic-bezier(.16,1,.3,1);
  padding:60px 36px 36px;
  overflow-y:auto;
  pointer-events:all;
}
#panel.open { right:0; }
#panel-close {
  position:absolute; top:20px; right:20px;
  background:none; border:1px solid #0ff4;
  color:#0ff; width:32px; height:32px;
  border-radius:4px; cursor:pointer;
  font-size:16px; font-family:inherit;
  transition:all .2s;
}
#panel-close:hover { background:#0ff2; }

#panel h2 {
  font-family:'Orbitron',sans-serif;
  font-size:18px; color:#0ff;
  text-shadow:0 0 10px #0ff;
  letter-spacing:3px; margin-bottom:6px;
}
#panel .p-sub {
  font-size:10px; color:#0ff5;
  letter-spacing:2px; margin-bottom:28px;
  padding-bottom:20px;
  border-bottom:1px solid #0ff2;
}
#panel-body { font-size:13px; color:#adf; line-height:1.9; }
#panel-body h3 {
  font-family:'Orbitron',sans-serif;
  font-size:12px; color:#0ff;
  letter-spacing:2px; margin:20px 0 8px;
}
#panel-body .tag {
  display:inline-block;
  border:1px solid #0ff4; color:#0ff;
  font-size:10px; padding:3px 10px;
  border-radius:2px; margin:3px 3px 3px 0;
}
#panel-body a {
  display:inline-block; margin-top:20px;
  background:linear-gradient(90deg,#0ff,#f0f);
  color:#000; font-weight:700; font-family:'Orbitron',sans-serif;
  font-size:11px; letter-spacing:2px;
  padding:10px 24px; border-radius:2px;
  text-decoration:none; transition:opacity .2s;
}
#panel-body a:hover { opacity:.8; }

/* ── TOOLTIP ── */
#tooltip {
  position:fixed; pointer-events:none; z-index:200;
  background:rgba(0,5,15,.9);
  border:1px solid #0ff4;
  padding:8px 16px;
  font-size:11px; color:#0ff;
  letter-spacing:2px;
  transform:translate(16px,-50%);
  opacity:0; transition:opacity .2s;
  white-space:nowrap;
}

@keyframes flicker {
  0%,100%{opacity:1} 92%{opacity:1} 93%{opacity:.4} 94%{opacity:1} 96%{opacity:.7} 97%{opacity:1}
}
</style>
</head>
<body>
    

<!-- Canvas -->
<canvas id="c"></canvas>

<!-- HUD -->
<div id="hud">
  <div class="corner tl"></div>
  <div class="corner tr"></div>
  <div class="corner bl"></div>
  <div class="corner br"></div>
  <div id="hud-name">Amir Hossein Papi</div>
  <div id="hud-title">// Full Stack Designer & Developer</div>
  <div id="controls">
    🖱 DRAG — Orbit<br>
    🖱 SCROLL — Zoom<br>
    👆 CLICK — Interact
  </div>
  <div id="status-bar">
    <div class="status-item">SYS <span>ONLINE</span></div>
    <div class="status-item">ENV <span>CYBERPUNK</span></div>
    <div class="status-item">OBJ <span id="obj-count">0</span></div>
    <div class="status-item">FPS <span id="fps">60</span></div>
  </div>
  <div id="scanline"></div>
  <div id="vignette"></div>
</div>

<!-- Side Panel -->
<div id="panel">
  <button id="panel-close">✕</button>
  <h2 id="panel-title">OBJECT</h2>
  <div class="p-sub" id="panel-sub">// LOADING DATA</div>
  <div id="panel-body"></div>
</div>

<!-- Tooltip -->
<div id="tooltip" id="tooltip"></div>
<!-- Custom Cursor -->
<div id="cur"></div>
<div id="cur-dot"></div>

<script>
// ════════════════════════════════════════════════════
//  LOADING SEQUENCE
// ════════════════════════════════════════════════════
const loadBar = document.getElementById('load-bar');
const loadPct = document.getElementById('load-pct');
let loadVal = 0;
const loadInterval = setInterval(() => {
  loadVal += Math.random() * 8 + 2;
  if (loadVal >= 100) { loadVal = 100; clearInterval(loadInterval); }
  loadBar.style.width = loadVal + '%';
  loadPct.textContent = Math.floor(loadVal) + '%';
  if (loadVal >= 100) {
    setTimeout(() => {
      const el = document.getElementById('loading');
      el.style.opacity = '0';
      setTimeout(() => el.remove(), 800);
    }, 400);
  }
}, 60);

// ════════════════════════════════════════════════════
//  CURSOR
// ════════════════════════════════════════════════════
const cur = document.getElementById('cur');
const curDot = document.getElementById('cur-dot');
let curX=0,curY=0,dotX=0,dotY=0;

document.addEventListener('mousemove', e => {
  curX = e.clientX; curY = e.clientY;
  curDot.style.left = curX+'px'; curDot.style.top = curY+'px';
});

function animateCursor() {
  dotX += (curX - dotX) * .15;
  dotY += (curY - dotY) * .15;
  cur.style.left = dotX+'px'; cur.style.top = dotY+'px';
  requestAnimationFrame(animateCursor);
}
animateCursor();

// ════════════════════════════════════════════════════
//  THREE.JS SETUP
// ════════════════════════════════════════════════════
const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 0.8;

const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x000510, 0.025);
scene.background = new THREE.Color(0x000510);

const camera = new THREE.PerspectiveCamera(55, innerWidth/innerHeight, 0.1, 200);
camera.position.set(0, 4, 12);
camera.lookAt(0, 0, 0);

// ── ORBIT CONTROLS (manual) ──
let isDragging = false, prevMouse = {x:0,y:0};
let spherical = { theta: 0, phi: Math.PI/3, r: 12 };
let targetSpherical = { ...spherical };
let camTarget = new THREE.Vector3(0, 0.5, 0);

canvas.addEventListener('mousedown', e => { isDragging=true; prevMouse={x:e.clientX,y:e.clientY}; });
window.addEventListener('mouseup', () => isDragging=false);
window.addEventListener('mousemove', e => {
  if (!isDragging) return;
  const dx = e.clientX - prevMouse.x;
  const dy = e.clientY - prevMouse.y;
  targetSpherical.theta -= dx * 0.008;
  targetSpherical.phi = Math.max(0.2, Math.min(Math.PI/2.2, targetSpherical.phi + dy * 0.006));
  prevMouse = {x:e.clientX,y:e.clientY};
});
window.addEventListener('wheel', e => {
  targetSpherical.r = Math.max(5, Math.min(22, targetSpherical.r + e.deltaY * 0.01));
});

// ════════════════════════════════════════════════════
//  LIGHTS
// ════════════════════════════════════════════════════
// Ambient
scene.add(new THREE.AmbientLight(0x0a1020, 3));

// Main overhead
const mainLight = new THREE.DirectionalLight(0x1a3060, 2);
mainLight.position.set(5, 10, 5);
mainLight.castShadow = true;
mainLight.shadow.mapSize.width = 1024;
mainLight.shadow.mapSize.height = 1024;
scene.add(mainLight);

// Neon lights
function neonLight(color, x, y, z, intensity=6, dist=12) {
  const l = new THREE.PointLight(color, intensity, dist);
  l.position.set(x,y,z);
  scene.add(l);
  return l;
}

const lights = {
  cyan1:   neonLight(0x00ffff, -6, 3, -4, 8, 16),
  magenta: neonLight(0xff00ff, 6, 2, -4, 6, 14),
  blue:    neonLight(0x0044ff, 0, 5, 6, 4, 12),
  cyan2:   neonLight(0x00ffcc, -3, 1, 4, 5, 10),
  purple:  neonLight(0x6600ff, 4, 3, 2, 4, 10),
};

// ════════════════════════════════════════════════════
//  HELPERS
// ════════════════════════════════════════════════════
function hex(c) { return new THREE.Color(c); }

function mat(color, emissive=0x000000, emissiveI=0, rough=0.3, metal=0.8, opacity=1, wire=false) {
  return new THREE.MeshStandardMaterial({
    color: hex(color), emissive: hex(emissive),
    emissiveIntensity: emissiveI,
    roughness: rough, metalness: metal,
    transparent: opacity<1, opacity,
    wireframe: wire,
  });
}

function box(w,h,d, material, x=0,y=0,z=0, rx=0,ry=0,rz=0, shadow=true) {
  const m = new THREE.Mesh(new THREE.BoxGeometry(w,h,d), material);
  m.position.set(x,y,z); m.rotation.set(rx,ry,rz);
  if(shadow){m.castShadow=true;m.receiveShadow=true;}
  scene.add(m); return m;
}

function cyl(rt,rb,h,seg, material, x=0,y=0,z=0, shadow=true) {
  const m = new THREE.Mesh(new THREE.CylinderGeometry(rt,rb,h,seg), material);
  m.position.set(x,y,z);
  if(shadow){m.castShadow=true;m.receiveShadow=true;}
  scene.add(m); return m;
}

function sph(r,ws,hs, material, x=0,y=0,z=0) {
  const m = new THREE.Mesh(new THREE.SphereGeometry(r,ws,hs), material);
  m.position.set(x,y,z); m.castShadow=true;
  scene.add(m); return m;
}

function tor(r,tube,rs,ts, material, x=0,y=0,z=0) {
  const m = new THREE.Mesh(new THREE.TorusGeometry(r,tube,rs,ts), material);
  m.position.set(x,y,z); m.castShadow=true;
  scene.add(m); return m;
}

function neonTube(from, to, color, r=0.03) {
  const dir = new THREE.Vector3().subVectors(to, from);
  const len = dir.length();
  const mid = new THREE.Vector3().addVectors(from, to).multiplyScalar(0.5);
  const m = new THREE.Mesh(
    new THREE.CylinderGeometry(r,r,len,8),
    new THREE.MeshStandardMaterial({ color:hex(color), emissive:hex(color), emissiveIntensity:3, roughness:0.1, metalness:0 })
  );
  m.position.copy(mid);
  m.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0), dir.normalize());
  scene.add(m); return m;
}

function makeText(text, size=0.5, color=0x00ffff, x=0,y=0,z=0, ry=0) {
  // Canvas texture text
  const canvas2 = document.createElement('canvas');
  canvas2.width = 512; canvas2.height = 128;
  const ctx = canvas2.getContext('2d');
  ctx.fillStyle = 'transparent';
  ctx.clearRect(0,0,512,128);
  ctx.font = `bold ${Math.floor(128*0.55)}px 'Orbitron', monospace`;
  ctx.fillStyle = '#' + hex(color).getHexString();
  ctx.shadowColor = '#' + hex(color).getHexString();
  ctx.shadowBlur = 20;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(text, 256, 64);

  const tex = new THREE.CanvasTexture(canvas2);
  const ratio = 512/128;
  const pw = size*ratio; const ph = size;
  const m = new THREE.Mesh(
    new THREE.PlaneGeometry(pw, ph),
    new THREE.MeshBasicMaterial({ map:tex, transparent:true, depthWrite:false, side:THREE.DoubleSide })
  );
  m.position.set(x,y,z); m.rotation.y=ry;
  scene.add(m); return m;
}

// ════════════════════════════════════════════════════
//  FLOOR & GRID
// ════════════════════════════════════════════════════
// Floor
const floorMesh = new THREE.Mesh(
  new THREE.PlaneGeometry(40,40),
  new THREE.MeshStandardMaterial({
    color:hex(0x010818), roughness:0.1, metalness:0.9,
  })
);
floorMesh.rotation.x = -Math.PI/2;
floorMesh.receiveShadow = true;
scene.add(floorMesh);

// Grid lines (neon)
function gridLines() {
  const mat2 = new THREE.LineBasicMaterial({ color:0x003344, transparent:true, opacity:0.6 });
  const geo = new THREE.BufferGeometry();
  const pts = [];
  for(let i=-20;i<=20;i+=1) {
    pts.push(i,0.005,-20, i,0.005,20);
    pts.push(-20,0.005,i, 20,0.005,i);
  }
  geo.setAttribute('position', new THREE.Float32BufferAttribute(pts,3));
  const lines = new THREE.LineSegments(geo, mat2);
  scene.add(lines);
}
gridLines();

// Grid glow lines (thicker, further apart)
function gridGlow() {
  const g = new THREE.LineBasicMaterial({ color:0x004466, transparent:true, opacity:0.4 });
  const geo = new THREE.BufferGeometry();
  const pts = [];
  for(let i=-20;i<=20;i+=5) {
    pts.push(i,0.01,-20, i,0.01,20);
    pts.push(-20,0.01,i, 20,0.01,i);
  }
  geo.setAttribute('position', new THREE.Float32BufferAttribute(pts,3));
  scene.add(new THREE.LineSegments(geo, g));
}
gridGlow();

// ════════════════════════════════════════════════════
//  BACK WALL
// ════════════════════════════════════════════════════
const wallM = mat(0x020a18, 0x000000, 0, 0.9, 0.1);
box(30, 10, 0.3, wallM, 0,5,-9);

// Wall horizontal neon strips
neonTube(new THREE.Vector3(-14,2,-8.8), new THREE.Vector3(14,2,-8.8), 0x00ffff, 0.04);
neonTube(new THREE.Vector3(-14,8,-8.8), new THREE.Vector3(14,8,-8.8), 0xff00ff, 0.04);
neonTube(new THREE.Vector3(-14,5,-8.8), new THREE.Vector3(-8,5,-8.8), 0x0088ff, 0.03);
neonTube(new THREE.Vector3(8,5,-8.8), new THREE.Vector3(14,5,-8.8), 0x0088ff, 0.03);

// Side walls
box(0.3,10,18, mat(0x020a18,0x000000,0,0.9,0.1), -9,5,0);
box(0.3,10,18, mat(0x020a18,0x000000,0,0.9,0.1), 9,5,0);

// Left wall neon
neonTube(new THREE.Vector3(-8.85,2,-9), new THREE.Vector3(-8.85,2,9), 0x00ffcc, 0.03);
neonTube(new THREE.Vector3(8.85,2,-9), new THREE.Vector3(8.85,2,9), 0xff00cc, 0.03);

// Ceiling strips
neonTube(new THREE.Vector3(-6,9.9,-8), new THREE.Vector3(-6,9.9,8), 0x0044ff, 0.04);
neonTube(new THREE.Vector3(6,9.9,-8), new THREE.Vector3(6,9.9,8), 0x4400ff, 0.04);
neonTube(new THREE.Vector3(0,9.9,-8), new THREE.Vector3(0,9.9,8), 0x00ffff, 0.02);

// ════════════════════════════════════════════════════
//  DESK
// ════════════════════════════════════════════════════
const deskMat = mat(0x0d1a2e,0x001122,0.2,0.3,0.9);
const deskGlowMat = mat(0x001133,0x00ffff,0.8,0.1,0.5);

// Desk top
const desk = box(7,0.15,2.5, deskMat, 0,1.85,0);

// Desk legs
const legM = mat(0x0a1522,0x001122,0.1,0.4,1);
box(0.12,1.8,0.12,legM, -3.3,0.9,-1); box(0.12,1.8,0.12,legM, 3.3,0.9,-1);
box(0.12,1.8,0.12,legM, -3.3,0.9,1); box(0.12,1.8,0.12,legM, 3.3,0.9,1);

// Desk neon strip under
neonTube(new THREE.Vector3(-3.4,1.78,-1.26), new THREE.Vector3(3.4,1.78,-1.26), 0x00ffff, 0.025);

// ════════════════════════════════════════════════════
//  MONITORS
// ════════════════════════════════════════════════════
function monitor(x,y,z, ry=0, screenColor=0x001133, label='MONITOR', w=2.2, h=1.3) {
  const grp = new THREE.Group();
  // Frame
  const frame = new THREE.Mesh(new THREE.BoxGeometry(w+0.1, h+0.1, 0.08),
    mat(0x0a0f1a,0x111111,0.1,0.5,0.9));
  grp.add(frame);
  // Screen
  const screen = new THREE.Mesh(new THREE.BoxGeometry(w,h,0.06),
    new THREE.MeshStandardMaterial({
      color:hex(screenColor), emissive:hex(screenColor),
      emissiveIntensity:1.2, roughness:0.1, metalness:0
    }));
  screen.position.z = 0.01;
  grp.add(screen);
  // Screen content texture
  const sc2 = document.createElement('canvas');
  sc2.width=512; sc2.height=300;
  const sctx = sc2.getContext('2d');
  sctx.fillStyle='#000814';
  sctx.fillRect(0,0,512,300);
  // scanlines
  for(let i=0;i<300;i+=4){
    sctx.fillStyle='rgba(0,255,255,0.03)';
    sctx.fillRect(0,i,512,2);
  }
  // text lines
  sctx.font='bold 22px monospace';
  sctx.fillStyle='#00ffff';
  sctx.shadowColor='#00ffff'; sctx.shadowBlur=8;
  sctx.fillText('> ' + label, 20, 40);
  sctx.font='13px monospace';
  sctx.fillStyle='#00cc88';
  sctx.shadowBlur=4;
  const lines = getScreenLines(label);
  lines.forEach((l,i) => sctx.fillText(l, 20, 75+i*22));
  const stex = new THREE.CanvasTexture(sc2);
  const screenFace = new THREE.Mesh(new THREE.PlaneGeometry(w*0.92,h*0.88),
    new THREE.MeshBasicMaterial({map:stex,transparent:true}));
  screenFace.position.z=0.065;
  grp.add(screenFace);
  // Stand
  const stand = new THREE.Mesh(new THREE.CylinderGeometry(0.06,0.1,0.5,8),
    mat(0x0a0f1a,0x000000,0,0.5,1));
  stand.position.y = -(h/2+0.3);
  grp.add(stand);
  const base = new THREE.Mesh(new THREE.CylinderGeometry(0.3,0.3,0.04,16),
    mat(0x0a0f1a,0x000000,0,0.5,1));
  base.position.y = -(h/2+0.55);
  grp.add(base);

  grp.position.set(x,y,z);
  grp.rotation.y = ry;
  grp.traverse(c=>{if(c.isMesh){c.castShadow=true;}});
  scene.add(grp);
  return grp;
}

function getScreenLines(label) {

//  RAYCASTER
// ════════════════════════════════════════════════════
const raycaster = new THREE.Raycaster();
const mouse2d = new THREE.Vector2();

function getHovered(e) {
  mouse2d.x = (e.clientX/innerWidth)*2-1;
  mouse2d.y = -(e.clientY/innerHeight)*2+1;
  raycaster.setFromCamera(mouse2d, camera);
  let hit = null;
  for(const obj of interactables) {
    const meshes = [];
    obj.mesh.traverse(c=>{ if(c.isMesh) meshes.push(c); });
    const ints = raycaster.intersectObjects(meshes);
    if(ints.length>0) { hit=obj; break; }
  }
  return hit;
}

const tooltip = document.getElementById('tooltip');
window.addEventListener('mousemove', e => {
  const hit = getHovered(e);
  if(hit) {
    cur.classList.add('hover');
    tooltip.style.opacity='1';
    tooltip.style.left=e.clientX+'px';
    tooltip.style.top=e.clientY+'px';
    tooltip.textContent='[ CLICK ] ' + hit.label;
  } else {
    cur.classList.remove('hover');
    tooltip.style.opacity='0';
  }
});

canvas.addEventListener('click', e => {
  const hit = getHovered(e);
  if(hit) openPanel(hit.data);
});

//  ANIMATE
// ════════════════════════════════════════════════════
const clock = new THREE.Clock();
let frames=0, lastFpsTime=0;

function animate() {
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();

  // FPS counter
  frames++;
  if(t-lastFpsTime>1){
    document.getElementById('fps').textContent=frames;
    frames=0; lastFpsTime=t;
  }

  // Smooth orbit
  spherical.theta += (targetSpherical.theta - spherical.theta) * 0.08;
  spherical.phi   += (targetSpherical.phi   - spherical.phi)   * 0.08;
  spherical.r     += (targetSpherical.r     - spherical.r)     * 0.08;

  camera.position.x = spherical.r * Math.sin(spherical.phi) * Math.sin(spherical.theta);
  camera.position.y = spherical.r * Math.cos(spherical.phi) + 1;
  camera.position.z = spherical.r * Math.sin(spherical.phi) * Math.cos(spherical.theta);
  camera.lookAt(camTarget);

  // Globe
  globeGroup.rotation.y = t*0.3;
  globeGroup.position.y = 4+Math.sin(t*0.8)*0.15;

  // Cube
  cubeGroup.rotation.x = t*0.4;
  cubeGroup.rotation.y = t*0.6;
  cubeGroup.position.y = 4+Math.cos(t*0.9)*0.15;

  // Particles drift
  const pp = pGeo.attributes.position.array;
  for(let i=0;i<pCount;i++){
    pp[i*3+1] += 0.003;
    if(pp[i*3+1]>9) pp[i*3+1]=0;
    pp[i*3] += Math.sin(t*0.3+i)*0.0005;
  }
  pGeo.attributes.position.needsUpdate=true;

  // Steam
  mugGroup.children.forEach(c=>{
    if(c.userData.steamIndex!==undefined){
      c.position.y = 0.25 + c.userData.steamIndex*0.12 + Math.sin(t*2+c.userData.steamIndex)*0.03;
      c.position.x = Math.sin(t*1.5+c.userData.steamIndex*2)*0.04;
      c.material.opacity = 0.2+Math.sin(t+c.userData.steamIndex)*0.15;
    }
  });

  // Neon light pulse
  lights.cyan1.intensity  = 7+Math.sin(t*1.3)*2;
  lights.magenta.intensity= 5+Math.cos(t*1.7)*2;
  lights.cyan2.intensity  = 4+Math.sin(t*2.1)*1.5;
  lights.purple.intensity = 3+Math.cos(t*0.9)*1;

  // Server blink
  scene.traverse(c=>{
    if(c.isMesh && c.geometry.type==='SphereGeometry' && c.geometry.parameters?.radius===0.04) {
      c.material.emissiveIntensity = 2+Math.sin(t*3+c.position.y*10)*1.5;
    }
  });

  renderer.render(scene, camera);
}

animate();

// ════════════════════════════════════════════════════
//  RESIZE
// ════════════════════════════════════════════════════
window.addEventListener('resize',()=>{
  camera.aspect=innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});
</script>
</body>
</html>
