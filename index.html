<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>نمایش قیمت و تصویر</title>
    <style>
        body { font-family: Tahoma, sans-serif; text-align: center; padding: 50px; }
        .card { border: 1px solid #ccc; padding: 20px; display: inline-block; border-radius: 10px; }
        img { width: 200px; height: 200px; border-radius: 50%; }
    </style>
</head>
<body>

    <div class="card">
        <h1>اطلاعات لحظه‌ای</h1>
        <img id="myImage" src="https://via.placeholder.com/200" alt="تصویر">
        <p>قیمت دلار: <span id="price">در حال دریافت...</span></p>
    </div>

    <script>
        async function fetchData() {
            try {
                // دریافت قیمت (مثال از یک API عمومی)
                const response = await fetch('https://api.exchangerate-api.com/v4/latest/USD');
                const data = await response.json();
                document.getElementById('price').innerText = data.rates.IRR + ' ریال';

                // تغییر تصویر به صورت تصادفی از Unsplash
                document.getElementById('myImage').src = 'https://source.unsplash.com/random/200x200';
            } catch (error) {
                document.getElementById('price').innerText = 'خطا در دریافت اطلاعات';
            }
        }
        fetchData();
    </script>
</body>
</html>
